<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00bbf9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b5de5;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10a37f" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <rect width="1200" height="500" fill="url(#grid)"/>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#neon)" filter="url(#glow)"/>
  
  <!-- Animated particles/stars -->
  <circle cx="100" cy="80" r="1.5" fill="#00f5d4" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="150" r="1" fill="#00bbf9" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="100" r="2" fill="#9b5de5" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="200" r="1.5" fill="#00f5d4" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="350" r="1" fill="#00bbf9" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="400" r="1.5" fill="#9b5de5" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="200" r="2" fill="#00f5d4" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="50" r="1" fill="#00bbf9" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="450" r="1.5" fill="#00f5d4" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Circuit lines -->
  <path d="M 0 250 L 200 250 L 220 230 L 250 230 L 270 250 L 400 250" 
        stroke="#10a37f" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 800 250 L 950 250 L 970 270 L 1000 270 L 1020 250 L 1200 250" 
        stroke="#10a37f" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Animated data flow dots -->
  <circle cx="0" cy="250" r="2" fill="#10a37f" opacity="0.8">
    <animate attributeName="cx" values="0;400" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="250" r="2" fill="#10a37f" opacity="0.8">
    <animate attributeName="cx" values="800;1200" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Hexagon decorations -->
  <polygon points="150,100 165,91 165,74 150,65 135,74 135,91" 
           fill="none" stroke="#10a37f" stroke-width="1" opacity="0.2"/>
  <polygon points="1050,120 1065,111 1065,94 1050,85 1035,94 1035,111" 
           fill="none" stroke="#10a37f" stroke-width="1" opacity="0.2"/>
  <polygon points="600,420 615,411 615,394 600,385 585,394 585,411" 
           fill="none" stroke="#10a37f" stroke-width="1" opacity="0.15"/>
  
  <!-- Bank icon -->
  <g transform="translate(565, 70)" filter="url(#glow)">
    <rect x="20" y="20" width="30" height="25" fill="none" stroke="url(#neon)" stroke-width="2" rx="2"/>
    <rect x="25" y="25" width="20" height="15" fill="none" stroke="url(#neon)" stroke-width="1.5" rx="1"/>
    <path d="M 15 45 L 55 45 L 50 20 L 20 20 Z" fill="none" stroke="url(#neon)" stroke-width="2"/>
    <path d="M 15 45 L 20 55 L 50 55 L 55 45" fill="none" stroke="url(#neon)" stroke-width="2"/>
    <circle cx="35" cy="32" r="3" fill="url(#neon)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Main title -->
  <text x="600" y="180" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="bold" 
        fill="url(#neon)" text-anchor="middle" filter="url(#strongGlow)">
    DIO BANK PRO
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="22" 
        fill="#c9d1d9" text-anchor="middle" letter-spacing="3">
    TYPESCRIPT BANKING SYSTEM
  </text>
  
  <!-- Tagline with typing effect -->
  <text x="600" y="255" font-family="'Segoe UI', Arial, sans-serif" font-size="14" 
        fill="#8b949e" text-anchor="middle">
    Clean Architecture • SOLID Principles • Automated Testing • Premium Evolution
  </text>
  
  <!-- Animated underline -->
  <rect x="450" y="270" width="0" height="2" fill="url(#neon)" opacity="0.8">
    <animate attributeName="width" values="0;300;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="450;450;450" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Feature pills -->
  <g transform="translate(0, 300)">
    <!-- Pill 1 -->
    <rect x="200" y="0" width="180" height="32" rx="16" fill="none" stroke="#10a37f" stroke-width="1.5" opacity="0.8"/>
    <text x="290" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="12" 
          fill="#10a37f" text-anchor="middle" font-weight="600">🏦 3 ACCOUNT TYPES</text>
    
    <!-- Pill 2 -->
    <rect x="420" y="0" width="180" height="32" rx="16" fill="none" stroke="#00bbf9" stroke-width="1.5" opacity="0.8"/>
    <text x="510" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="12" 
          fill="#00bbf9" text-anchor="middle" font-weight="600">🧪 39 TESTS PASSING</text>
    
    <!-- Pill 3 -->
    <rect x="640" y="0" width="180" height="32" rx="16" fill="none" stroke="#9b5de5" stroke-width="1.5" opacity="0.8"/>
    <text x="730" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="12" 
          fill="#9b5de5" text-anchor="middle" font-weight="600">📐 CLEAN ARCHITECTURE</text>
    
    <!-- Pill 4 -->
    <rect x="860" y="0" width="140" height="32" rx="16" fill="none" stroke="#00f5d4" stroke-width="1.5" opacity="0.8"/>
    <text x="930" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="12" 
          fill="#00f5d4" text-anchor="middle" font-weight="600">⚡ TYPESCRIPT</text>
  </g>
  
  <!-- Tech stack icons area -->
  <g transform="translate(0, 360)">
    <text x="600" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="11" 
          fill="#8b949e" text-anchor="middle" opacity="0.6">TECH STACK</text>
    
    <!-- Icons as colored circles with text -->
    <circle cx="350" cy="35" r="18" fill="#3178C6" opacity="0.9"/>
    <text x="350" y="40" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">TS</text>
    
    <circle cx="400" cy="35" r="18" fill="#339933" opacity="0.9"/>
    <text x="400" y="40" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">NODE</text>
    
    <circle cx="450" cy="35" r="18" fill="#6E9F18" opacity="0.9"/>
    <text x="450" y="40" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">VIT</text>
    
    <circle cx="500" cy="35" r="18" fill="#4B32C3" opacity="0.9"/>
    <text x="500" y="40" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">ESL</text>
    
    <circle cx="550" cy="35" r="18" fill="#F7B93E" opacity="0.9"/>
    <text x="550" y="40" font-family="Arial" font-size="10" fill="black" text-anchor="middle" font-weight="bold">PRT</text>
    
    <circle cx="600" cy="35" r="18" fill="#2088FF" opacity="0.9"/>
    <text x="600" y="40" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">GH</text>
    
    <circle cx="650" cy="35" r="18" fill="#10a37f" opacity="0.9"/>
    <text x="650" y="40" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">DIO</text>
    
    <circle cx="700" cy="35" r="18" fill="#9b5de5" opacity="0.9"/>
    <text x="700" y="40" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">SOL</text>
    
    <circle cx="750" cy="35" r="18" fill="#00f5d4" opacity="0.9"/>
    <text x="750" y="40" font-family="Arial" font-size="10" fill="#0a0e1a" text-anchor="middle" font-weight="bold">ARC</text>
    
    <circle cx="800" cy="35" r="18" fill="#ff6b35" opacity="0.9"/>
    <text x="800" y="40" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">OOP</text>
  </g>
  
  <!-- Bottom info bar -->
  <rect x="0" y="470" width="1200" height="30" fill="#0a0e1a" opacity="0.8"/>
  <text x="600" y="490" font-family="'Segoe UI', Arial, sans-serif" font-size="11" 
        fill="#8b949e" text-anchor="middle">
    Digital Innovation One Challenge — Premium Evolution by Matheus Florindo
  </text>
  
  <!-- Corner accents -->
  <path d="M 0 0 L 40 0 L 40 3 L 3 3 L 3 40 L 0 40 Z" fill="#10a37f" opacity="0.5"/>
  <path d="M 1200 0 L 1160 0 L 1160 3 L 1197 3 L 1197 40 L 1200 40 Z" fill="#10a37f" opacity="0.5"/>
  <path d="M 0 500 L 0 460 L 3 460 L 3 497 L 40 497 L 40 500 Z" fill="#10a37f" opacity="0.5"/>
  <path d="M 1200 500 L 1200 460 L 1197 460 L 1197 497 L 1160 497 L 1160 500 Z" fill="#10a37f" opacity="0.5"/>
</svg>
